<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HowTimeFly - 时间线媒体播放</title>
    <style>
        /* CSS2.1 兼容样式 - 适配旧版电视浏览器 */
        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            color: #2c3e50;
            font-size: 14px;
        }

        .header {
            background: #667eea;
            padding: 15px 20px;
            overflow: hidden;
            border-bottom: 2px solid #5568d3;
            zoom: 1;
        }

        .header h1 {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            float: left;
            margin: 0;
        }

        .header-controls {
            float: right;
        }

        .header-controls button {
            float: left;
            margin-left: 5px;
        }

        .header-controls:after {
            content: "";
            display: block;
            clear: both;
            height: 0;
            visibility: hidden;
        }

        .btn {
            padding: 8px 16px;
            background: #cccccc;
            border: 1px solid #dddddd;
            color: #333333;
            cursor: pointer;
            font-size: 14px;
            margin-left: 5px;
            display: inline-block;
        }

        .btn.primary {
            background: #4facfe;
            border-color: #4facfe;
            color: #ffffff;
        }

        .btn.danger {
            background: #ff6b6b;
            border-color: #ff6b6b;
            color: #ffffff;
        }

        .stats-bar {
            background: #ffffff;
            padding: 12px 20px;
            font-size: 13px;
            border-bottom: 1px solid #e1e8ed;
            overflow: hidden;
            zoom: 1;
        }

        .stats-bar span {
            color: #7f8c8d;
            margin-right: 20px;
            display: inline;
        }

        .stats-bar strong {
            color: #2c3e50;
            font-weight: bold;
        }

        /* 标签页 - 使用 float 布局替代 flex */
        .tabs {
            background: #ffffff;
            border-bottom: 2px solid #e1e8ed;
            overflow: hidden;
            zoom: 1;
        }

        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #7f8c8d;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            float: left;
            display: block;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-count {
            margin-left: 6px;
            padding: 2px 8px;
            background: #e1e8ed;
            font-size: 12px;
            color: #2c3e50;
            display: inline;
        }

        .tab.active .tab-count {
            background: #667eea;
            color: #ffffff;
        }

        .tabs:after {
            content: "";
            display: block;
            clear: both;
            height: 0;
            visibility: hidden;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .timeline-section {
            margin-bottom: 30px;
        }

        .timeline-header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
            overflow: hidden;
            zoom: 1;
        }

        .timeline-header span {
            float: left;
            display: block;
        }

        .timeline-header button {
            float: right;
            display: block;
        }

        .timeline-header:after {
            content: "";
            display: block;
            clear: both;
            height: 0;
            visibility: hidden;
        }

        .timeline-header .batch-actions {
            display: none;
        }

        .timeline-header.show-batch .batch-actions {
            display: block;
        }

        .timeline-header.show-batch .batch-actions button {
            float: left;
            margin-left: 10px;
        }

        /* 网格布局 - 使用 float 替代 grid */
        .timeline-grid {
            overflow: hidden;
            zoom: 1;
        }

        .timeline-grid:after {
            content: "";
            display: block;
            clear: both;
            height: 0;
            visibility: hidden;
        }

        .media-item {
            position: relative;
            background: #ffffff;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            float: left;
            width: 180px;
            margin: 10px;
            display: block;
        }

        .media-item:hover {
            border-color: #667eea;
        }

        .media-item:focus {
            outline: 3px solid #667eea;
        }

        .media-item.selected {
            border-color: #667eea;
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            height: 180px;
            background: #ecf0f1;
            overflow: hidden;
            text-align: center;
        }

        .thumbnail-container img {
            width: 100%;
            height: 100%;
            display: block;
        }

        .thumbnail-container .placeholder {
            width: 100%;
            height: 100%;
            background: #fdcb6e;
            color: #2d3436;
            font-size: 40px;
            line-height: 180px;
            text-align: center;
        }

        .checkbox {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 22px;
            height: 22px;
            background: #ffffff;
            border: 2px solid #667eea;
            cursor: pointer;
            display: none;
        }

        .show-checkboxes .checkbox {
            display: block;
        }

        .checkbox.checked {
            background: #667eea;
            border-color: #667eea;
        }

        .checkbox.checked span {
            display: block;
            width: 8px;
            height: 4px;
            border: solid white;
            border-width: 0 2px 2px 0;
            position: absolute;
            top: 6px;
            left: 6px;
        }

        .video-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            background: #667eea;
            color: #ffffff;
            font-size: 10px;
            line-height: 32px;
            text-align: center;
        }

        .media-info {
            padding: 12px;
            background: #ffffff;
        }

        .media-filename {
            font-size: 13px;
            font-weight: 500;
            color: #2c3e50;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .media-date {
            font-size: 12px;
            color: #7f8c8d;
        }

        .media-date.pending {
            color: #e67e22;
            font-weight: 500;
        }

        /* 快速编辑样式 */
        .edit-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: #ffffff;
            border: none;
            cursor: pointer;
            display: none;
            font-size: 14px;
            color: #667eea;
            line-height: 28px;
            text-align: center;
        }

        .media-item:hover .edit-btn {
            display: block;
        }

        .edit-btn:hover {
            background: #667eea;
            color: #ffffff;
        }

        .date-input-container {
            position: relative;
            margin-top: 8px;
            display: none;
        }

        .date-input-container.visible {
            display: block;
        }

        .date-input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #667eea;
            font-size: 12px;
            background: #f8f9fa;
        }

        .date-input-buttons {
            overflow: hidden;
            zoom: 1;
            margin-top: 6px;
        }

        .date-input-buttons:after {
            content: "";
            display: block;
            clear: both;
            height: 0;
            visibility: hidden;
        }

        .date-input-buttons .btn {
            float: left;
            width: 48%;
            margin-left: 2%;
            padding: 4px 8px;
            font-size: 12px;
        }

        .date-input-buttons .btn:first-child {
            margin-left: 0;
        }

        .quick-edit-date {
            cursor: pointer;
            padding: 2px 6px;
            display: inline;
        }

        .quick-edit-date:hover {
            background: #e8eaf0;
        }

        .quick-edit-date .edit-icon {
            font-size: 12px;
            color: #999999;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            z-index: 1000;
        }

        .modal.active {
            display: block;
        }

        .modal-content {
            position: absolute;
            top: 60px;
            left: 20px;
            right: 20px;
            bottom: 80px;
            text-align: center;
        }

        .modal-content img,
        .modal-content video {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: inline-block;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: #333333;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            line-height: 40px;
            text-align: center;
        }

        .modal-close:hover {
            background: #555555;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            width: 50px;
            height: 50px;
            background: #333333;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            line-height: 50px;
            text-align: center;
            margin-top: -25px;
        }

        .modal-nav:hover {
            background: #555555;
        }

        .modal-nav.prev {
            left: 20px;
        }

        .modal-nav.next {
            right: 20px;
        }

        .modal-date-bar {
            position: absolute;
            bottom: 80px;
            left: 50%;
            margin-left: -150px;
            width: 300px;
            background: #000000;
            padding: 10px 20px;
            color: #fff;
            font-size: 14px;
            text-align: center;
            overflow: hidden;
            zoom: 1;
        }

        .modal-date-bar span {
            display: block;
            float: left;
        }

        .modal-date-bar button {
            float: right;
        }

        /* 播放控制栏 */
        .playback-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #000000;
            padding: 15px 20px;
            overflow: hidden;
            zoom: 1;
        }

        .playback-controls:after {
            content: "";
            display: block;
            clear: both;
            height: 0;
            visibility: hidden;
        }

        .play-btn {
            width: 50px;
            height: 50px;
            background: #667eea;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            float: left;
            line-height: 50px;
            text-align: center;
        }

        .play-btn:hover {
            background: #5568d3;
        }

        .playback-info {
            float: left;
            margin-left: 15px;
            color: #fff;
            line-height: 50px;
            overflow: hidden;
            zoom: 1;
        }

        .playback-info span {
            display: block;
            float: left;
            margin-left: 15px;
        }

        /* 排序控制按钮 */
        .sort-control {
            padding: 6px 14px;
            background: #e8eaf0;
            border: 1px solid #667eea;
            font-size: 13px;
            color: #667eea;
            cursor: pointer;
            display: inline;
        }

        .sort-control:hover {
            background: #d0d4e0;
        }

        .playback-progress {
            font-size: 16px;
            font-weight: 500;
        }

        .playback-speed {
            padding: 6px 12px;
            background: #333333;
            font-size: 13px;
            cursor: pointer;
            color: #ffffff;
            display: inline;
        }

        .playback-speed:hover {
            background: #555555;
        }

        .playback-option {
            width: 40px;
            height: 40px;
            background: #333333;
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            float: right;
            line-height: 40px;
            text-align: center;
            margin-left: 10px;
        }

        .playback-option:hover {
            background: #555555;
        }

        /* 播放进度条 */
        .playback-progress-bar {
            position: absolute;
            bottom: 80px;
            left: 20px;
            right: 20px;
            height: 3px;
            background: #333333;
            overflow: hidden;
        }

        .playback-progress-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
        }

        /* 全屏模式 */
        .modal.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
        }

        .modal.fullscreen .modal-content {
            width: 100%;
            height: 100%;
            max-width: none;
            max-height: none;
            margin: 0;
        }

        .modal.fullscreen .modal-content img,
        .modal.fullscreen .modal-content video {
            width: 100%;
            height: 100%;
            max-height: none;
        }

        /* 批量编辑栏 */
        .batch-bar {
            background: #667eea;
            padding: 12px 20px;
            display: none;
            overflow: hidden;
            zoom: 1;
        }

        .batch-bar.visible {
            display: block;
        }

        .batch-bar .batch-info {
            float: left;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            line-height: 30px;
        }

        .batch-bar .header-controls {
            float: right;
        }

        .batch-info {
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 50px;
            color: #7f8c8d;
            font-size: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: #95a5a6;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #7f8c8d;
        }

        .empty-state p {
            margin-bottom: 20px;
            color: #95a5a6;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            margin-left: -150px;
            width: 300px;
            background: #667eea;
            color: #ffffff;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            z-index: 2000;
            text-align: center;
        }

        .toast.hide {
            display: none;
        }
    </style>
</head>
<body>
    <script>
        // 刷新页面
        function refreshPage() {
            location.reload(true);
        }
    </script>

    <div class="header">
        <h1>HowTimeFly <small style="font-size: 14px; color: #ff6b6b;">v6.4-FixPlay</small></h1>
        <div class="header-controls">
            <button class="btn" onclick="startPlayback()">播放</button>
            <button class="btn" onclick="refreshStats()">刷新数据</button>
            <button class="btn primary" onclick="startScan()">扫描</button>
        </div>
    </div>

    <div class="stats-bar" id="statsBar">
        <span>加载中...</span>
    </div>

    <!-- 标签页 -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('timeline')" id="tab-timeline">
            时间线
            <span class="tab-count" id="count-timeline">0</span>
        </button>
        <button class="tab" onclick="switchTab('pending')" id="tab-pending">
            待处理日期
            <span class="tab-count" id="count-pending">0</span>
        </button>
    </div>

    <!-- 批量操作栏 -->
    <div class="batch-bar" id="batchBar">
        <div class="batch-info">已选择 <strong id="selectedCount">0</strong> 个文件</div>
        <div class="header-controls">
            <button class="btn" onclick="toggleAll()">全选</button>
            <button class="btn" onclick="clearSelection()">清空</button>
            <button class="btn primary" onclick="batchSetDate()">批量设置日期</button>
        </div>
    </div>

    <div class="container">
        <div id="content"></div>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="/static/music/background.mp3" type="audio/mpeg">
    </audio>

    <!-- 模态框 -->
    <div class="modal" id="modal">
        <button class="modal-close" onclick="closeModal()">×</button>
        <button class="modal-nav prev" onclick="navigate(-1)">‹</button>
        <button class="modal-nav next" onclick="navigate(1)">›</button>
        <div class="modal-content" id="modalContent"></div>
        <div class="modal-date-bar" id="modalDateBar" style="display:none;">
            <span id="modalDateText"></span>
            <button class="btn" onclick="editDate()" style="margin-left: 10px;">编辑日期</button>
        </div>
        <!-- 播放控制栏 -->
        <div class="playback-controls" id="playbackControls">
            <button class="play-btn" id="playBtn" onclick="togglePlay()" title="播放/暂停 (空格)">
                <span id="playIcon">▶</span>
            </button>
            <div class="playback-info">
                <span class="playback-progress" id="playbackProgress">1 / 6</span>
                <span class="playback-speed" id="playbackSpeed" onclick="cycleSpeed()">3s</span>
            </div>
            <button class="playback-option" onclick="startFromFirst()" title="从头播放">⏮</button>
            <button class="playback-option" onclick="toggleFullscreen()" title="全屏 (F)">⛶</button>
        </div>
        <!-- 播放进度条 -->
        <div class="playback-progress-bar" id="playbackProgressBar">
            <div class="playback-progress-fill" id="playbackProgressFill"></div>
        </div>
    </div>

    <script>
        var API_BASE = '/api/v1';
        var currentTab = 'timeline';
        var currentItems = [];
        var currentIndex = -1;
        var selectedItems = [];  // 使用数组代替 Set
        var showCheckboxes = false;

        // 播放相关变量
        var isPlaying = false;
        var playTimer = null;
        var playbackSpeeds = [3000, 5000, 10000];  // 照片显示时长 (毫秒)
        var currentSpeedIndex = 1;  // 默认5秒
        var videoElement = null;
        var bgMusicElement = null;
        var bgMusicVolume = 0.3;  // 背景音乐音量 (0-1)
        // 排序相关变量
        var currentSortOrder = 'desc';  // desc = 倒序(晚→早), asc = 正序(早→晚)

        // 分页相关变量
        var currentPage = 0;
        var pageSize = 30;
        var totalItems = 0;
        var hasMore = false;
        var isLoading = false;

        // ============ 通用 XHR 请求函数 ============
        function xhrRequest(url, method, data, callback, errorCallback) {
            var xhr = new XMLHttpRequest();
            xhr.open(method, url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try {
                            var response = JSON.parse(xhr.responseText);
                            callback(response);
                        } catch(e) {
                            callback(xhr.responseText);
                        }
                    } else if (errorCallback) {
                        errorCallback(xhr.status);
                    }
                }
            };
            if (data) {
                xhr.send(JSON.stringify(data));
            } else {
                xhr.send();
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化速度显示
            initSpeedDisplay();
            // 加载数据
            refreshStats(function() {
                loadContent();
            }, function(error) {
                var content = document.getElementById('content');
                if (content) {
                    content.innerHTML = '<div class="empty-state"><h2>加载失败</h2><p>错误: ' + error + '</p></div>';
                }
            });
        });

        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            var tabs = document.querySelectorAll('.tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            var tabElement = document.getElementById('tab-' + tab);
            if (tabElement) {
                tabElement.classList.add('active');
            }
            clearSelection();
            loadContent();
        }

        // 加载内容
        function loadContent(callback, errorCallback) {
            if (currentTab === 'timeline') {
                loadTimeline(callback, errorCallback);
            } else {
                loadPending(callback, errorCallback);
            }
        }

        // 刷新统计
        function refreshStats(callback, errorCallback) {
            console.log('[HowTimeFly] 开始加载统计信息...');

            xhrRequest(API_BASE + '/stats', 'GET', null, function(stats) {
                console.log('[HowTimeFly] 统计数据:', stats);

                var statsBar = document.getElementById('statsBar');
                if (statsBar) {
                    statsBar.innerHTML =
                        '<span>照片: <strong>' + stats.total_photos + '</strong></span>' +
                        '<span>视频: <strong>' + stats.total_videos + '</strong></span>' +
                        '<span>总大小: <strong>' + stats.total_size_mb.toFixed(1) + ' MB</strong></span>';
                }

                // 获取待处理数量
                xhrRequest(API_BASE + '/media/pending?limit=1', 'GET', null, function(pendingData) {
                    var pendingCount = pendingData.total || 0;

                    var countTimeline = document.getElementById('count-timeline');
                    var countPending = document.getElementById('count-pending');
                    if (countTimeline) {
                        countTimeline.textContent = stats.total_photos + stats.total_videos - pendingCount;
                    }
                    if (countPending) {
                        countPending.textContent = pendingCount;
                    }
                    console.log('[HowTimeFly] 统计信息更新完成');
                    if (callback) callback();
                }, function(status) {
                    var errorMsg = '获取待处理数量失败: ' + status;
                    console.error('[HowTimeFly]', errorMsg);
                    if (errorCallback) errorCallback(errorMsg);
                });
            }, function(status) {
                var errorMsg = '统计加载失败: ' + status;
                console.error('[HowTimeFly]', errorMsg);
                var statsBar = document.getElementById('statsBar');
                if (statsBar) {
                    statsBar.innerHTML = '<span>' + errorMsg + '</span>';
                }
                if (errorCallback) errorCallback(errorMsg);
            });
        }

        // 开始扫描
        function startScan() {
            xhrRequest(API_BASE + '/scan/start', 'POST', {}, function(data) {
                alert(data.status);
                refreshStats(function() {
                    loadContent();
                });
            }, function(status) {
                alert('启动失败: ' + status);
            });
        }

        // 加载时间线
        function loadTimeline(callback, errorCallback) {
            var content = document.getElementById('content');
            content.innerHTML = '<div class="loading">加载中</div>';
            hideBatchBar();

            // 重置分页状态
            currentPage = 0;
            currentItems = [];
            selectedItems = [];

            loadTimelinePage(function() {
                if (currentItems.length === 0) {
                    content.innerHTML =
                        '<div class="empty-state">' +
                        '<h2>暂无媒体文件</h2>' +
                        '<p>请将照片或视频放入配置的扫描目录，然后点击"扫描"</p>' +
                        '</div>';
                    if (callback) callback();
                    return;
                }

                var grouped = groupByDate(currentItems);
                renderGrid(grouped);
                if (callback) callback();
            }, errorCallback);
        }

        // 加载时间线分页数据
        function loadTimelinePage(callback, errorCallback) {
            if (isLoading) {
                if (callback) callback();
                return;
            }

            isLoading = true;
            var offset = currentPage * pageSize;

            xhrRequest(API_BASE + '/media/timeline?limit=' + pageSize + '&offset=' + offset + '&sort=' + currentSortOrder, 'GET', null, function(data) {
                console.log('[HowTimeFly] 第' + (currentPage + 1) + '页数据项数:', data.items.length, '总数:', data.total);

                // 将新数据追加到数组
                for (var i = 0; i < data.items.length; i++) {
                    currentItems.push(data.items[i]);
                }

                totalItems = data.total;
                hasMore = data.has_more;

                // 更新时间线角标
                var countTimeline = document.getElementById('count-timeline');
                if (countTimeline) {
                    countTimeline.textContent = totalItems;
                }

                currentPage++;
                isLoading = false;

                console.log('[HowTimeFly] 已加载', currentItems.length, '/', totalItems, 'has_more:', hasMore);

                if (callback) callback();
            }, function(status) {
                isLoading = false;
                var errorMsg = '时间线加载失败: ' + status;
                console.error('[HowTimeFly]', errorMsg);
                if (errorCallback) errorCallback(errorMsg);
            });
        }

        // 检查并加载更多数据（播放时自动调用）
        function checkAndLoadMore() {
            // 如果剩余少于5条，自动加载下一页
            var remaining = currentItems.length - currentIndex;
            if (hasMore && !isLoading && remaining < 5) {
                console.log('[HowTimeFly] 自动加载下一页...');
                loadTimelinePage();
            }
        }

        // 切换排序方式
        function toggleSort() {
            currentSortOrder = currentSortOrder === 'desc' ? 'asc' : 'desc';
            loadTimeline();
            var msg = currentSortOrder === 'asc' ? '正序 (早→晚)' : '倒序 (晚→早)';
            showToast('切换为' + msg);
        }

        // 加载待处理日期的文件
        function loadPending(callback, errorCallback) {
            var content = document.getElementById('content');
            content.innerHTML = '<div class="loading">加载中</div>';
            showBatchBar();

            xhrRequest(API_BASE + '/media/pending?limit=50', 'GET', null, function(data) {
                currentItems = data.items;
                selectedItems = [];

                if (currentItems.length === 0) {
                    content.innerHTML =
                        '<div class="empty-state">' +
                        '<h2>没有待处理文件</h2>' +
                        '<p>所有媒体文件都已设置拍摄日期</p>' +
                        '</div>';
                    hideBatchBar();
                    if (callback) callback();
                    return;
                }

                var countPending = document.getElementById('count-pending');
                if (countPending) {
                    countPending.textContent = data.total;
                }
                renderGrid(currentItems, true);  // true = 显示复选框
                if (callback) callback();
            }, function(status) {
                var errorMsg = '加载失败: ' + status;
                content.innerHTML = '<div class="empty-state"><h2>加载失败</h2><p>' + errorMsg + '</p></div>';
                hideBatchBar();
                if (errorCallback) errorCallback(errorMsg);
            });
        }

        // 渲染网格
        function renderGrid(itemsOrGrouped, withCheckboxes) {
            if (withCheckboxes === undefined) {
                withCheckboxes = false;
            }
            var content = document.getElementById('content');

            if (withCheckboxes) {
                // 平铺的待处理文件列表
                showCheckboxes = true;
                var html = '<div class="timeline-grid">';
                for (var i = 0; i < itemsOrGrouped.length; i++) {
                    html += renderPendingItem(itemsOrGrouped[i]);
                }
                html += '</div>';
                content.innerHTML = html;
            } else {
                // 按日期分组的时间线
                var grouped = itemsOrGrouped;
                var html = '';

                // 添加排序控制栏
                html += '<div class="timeline-section">' +
                    '<div class="timeline-header">' +
                    '<span>时间线</span>' +
                    '<button class="sort-control" onclick="toggleSort()" title="切换排序方式">';
                if (currentSortOrder === 'asc') {
                    html += '正序 ↑ (早→晚)';
                } else {
                    html += '倒序 ↓ (晚→早)';
                }
                html += '</button></div></div>';

                // 遍历分组
                var dates = Object.keys(grouped);
                for (var d = 0; d < dates.length; d++) {
                    var date = dates[d];
                    var items = grouped[date];
                    html += '<div class="timeline-section">' +
                        '<div class="timeline-header">' +
                        '<span>' + date + '</span>' +
                        '<span style="font-size: 14px; font-weight: normal;">' + items.length + ' 项</span>' +
                        '</div>' +
                        '<div class="timeline-grid">';
                    for (var i = 0; i < items.length; i++) {
                        html += renderItem(items[i]);
                    }
                    html += '</div></div>';
                }
                content.innerHTML = html;
            }
        }

        // 按日期分组
        function groupByDate(items) {
            var grouped = {};
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var date = new Date(item.create_time * 1000);
                var dateKey = formatDateKey(date);
                if (!grouped[dateKey]) {
                    grouped[dateKey] = [];
                }
                grouped[dateKey].push(item);
            }
            return grouped;
        }

        // 格式化日期
        function formatDateKey(date) {
            var now = new Date();
            var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            var itemDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());

            var diffDays = Math.floor((today - itemDate) / (1000 * 60 * 60 * 24));

            if (diffDays === 0) return '今天';
            if (diffDays === 1) return '昨天';
            if (diffDays < 7) {
                var weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                return weekdays[date.getDay()];
            }

            return date.getFullYear() + '年' + (date.getMonth() + 1) + '月' + date.getDate() + '日';
        }

        // 渲染时间线项目
        function renderItem(item) {
            var thumbnailUrl = item.thumbnail_url || '';
            var isVideo = item.file_type === 'video';
            var itemIndex = currentItems.indexOf(item);

            var html = '<div class="media-item" data-id="' + item.id + '" tabindex="0">' +
                '<div class="thumbnail-container" onclick="openMedia(' + itemIndex + ')">';

            if (thumbnailUrl) {
                html += '<img src="' + thumbnailUrl + '" alt="' + item.file_name + '" loading="lazy">';
            } else {
                html += '<div class="placeholder">' + (isVideo ? 'VIDEO' : 'PHOTO') + '</div>';
            }

            if (isVideo) {
                html += '<div class="video-badge">PLAY</div>';
            }

            html += '</div>' +
                '<div class="media-info">' +
                '<div class="media-filename" onclick="openMedia(' + itemIndex + ')">' + item.file_name + '</div>' +
                '<div class="media-date quick-edit-date" id="date-display-' + item.id + '" onclick="event.stopPropagation(); showDateInput(' + item.id + ', this)">' +
                formatDate(item.create_time) +
                '<span class="edit-icon">EDIT</span>' +
                '</div>' +
                '<div class="date-input-container" id="date-input-' + item.id + '" onclick="event.stopPropagation()">' +
                '<input type="datetime-local" class="date-input" id="input-' + item.id + '">' +
                '<div class="date-input-buttons">' +
                '<button class="btn primary" onclick="event.stopPropagation(); saveDate(' + item.id + ')">保存</button>' +
                '<button class="btn" onclick="event.stopPropagation(); hideDateInput(' + item.id + ')">取消</button>' +
                '</div></div></div>' +
                '<button class="edit-btn" onclick="event.stopPropagation(); showDateInputById(' + item.id + ')" title="编辑日期">EDIT</button>' +
                '</div>';

            return html;
        }

        // 渲染待处理项目（带复选框）
        function renderPendingItem(item) {
            var thumbnailUrl = item.thumbnail_url || '';
            var isVideo = item.file_type === 'video';
            var itemIndex = currentItems.indexOf(item);

            var html = '<div class="media-item" data-id="' + item.id + '" tabindex="0">' +
                '<div class="checkbox" onclick="event.stopPropagation(); toggleSelect(' + item.id + ', this)"></div>' +
                '<div class="thumbnail-container" onclick="openMedia(' + itemIndex + ')">';

            if (thumbnailUrl) {
                html += '<img src="' + thumbnailUrl + '" alt="' + item.file_name + '" loading="lazy">';
            } else {
                html += '<div class="placeholder">' + (isVideo ? 'VIDEO' : 'PHOTO') + '</div>';
            }

            if (isVideo) {
                html += '<div class="video-badge">PLAY</div>';
            }

            html += '</div>' +
                '<div class="media-info">' +
                '<div class="media-filename" onclick="openMedia(' + itemIndex + ')">' + item.file_name + '</div>' +
                '<div class="media-date pending quick-edit-date" id="date-display-' + item.id + '" onclick="event.stopPropagation(); showDateInput(' + item.id + ', this)">' +
                '待设置日期 <span class="edit-icon">EDIT</span>' +
                '</div>' +
                '<div class="date-input-container" id="date-input-' + item.id + '" onclick="event.stopPropagation()">' +
                '<input type="datetime-local" class="date-input" id="input-' + item.id + '">' +
                '<div class="date-input-buttons">' +
                '<button class="btn primary" onclick="event.stopPropagation(); saveDate(' + item.id + ')">保存</button>' +
                '<button class="btn" onclick="event.stopPropagation(); hideDateInput(' + item.id + ')">取消</button>' +
                '</div></div></div>' +
                '<button class="edit-btn" onclick="event.stopPropagation(); showDateInputById(' + item.id + ')" title="编辑日期">EDIT</button>' +
                '</div>';

            return html;
        }

        // 通过ID显示日期输入框（用于编辑按钮）
        function showDateInputById(itemId) {
            var dateDisplay = document.getElementById('date-display-' + itemId);
            if (dateDisplay) {
                showDateInput(itemId, dateDisplay);
            }
        }

        // 格式化日期显示
        function formatDate(timestamp) {
            if (!timestamp) return '⚠ 待设置日期';
            var date = new Date(timestamp * 1000);
            return date.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        // 显示日期输入框
        function showDateInput(itemId, element) {
            var container = document.getElementById('date-input-' + itemId);
            var input = document.getElementById('input-' + itemId);

            // 获取当前项目的日期
            var item = null;
            for (var i = 0; i < currentItems.length; i++) {
                if (currentItems[i].id === itemId) {
                    item = currentItems[i];
                    break;
                }
            }

            if (item && item.create_time) {
                var date = new Date(item.create_time * 1000);
                // 设置为本地时间格式 (datetime-local 需要 YYYY-MM-DDTHH:mm 格式)
                var year = date.getFullYear();
                var month = padZero(date.getMonth() + 1);
                var day = padZero(date.getDate());
                var hours = padZero(date.getHours());
                var minutes = padZero(date.getMinutes());
                input.value = year + '-' + month + '-' + day + 'T' + hours + ':' + minutes;
            } else {
                // 默认当前时间
                var now = new Date();
                var year = now.getFullYear();
                var month = padZero(now.getMonth() + 1);
                var day = padZero(now.getDate());
                var hours = padZero(now.getHours());
                var minutes = padZero(now.getMinutes());
                input.value = year + '-' + month + '-' + day + 'T' + hours + ':' + minutes;
            }

            container.classList.add('visible');
            input.focus();
        }

        // 补零辅助函数
        function padZero(num) {
            return num < 10 ? '0' + num : '' + num;
        }

        // 隐藏日期输入框
        function hideDateInput(itemId) {
            var container = document.getElementById('date-input-' + itemId);
            container.classList.remove('visible');
        }

        // 保存日期
        function saveDate(itemId) {
            var input = document.getElementById('input-' + itemId);
            var value = input.value;

            if (!value) {
                alert('请选择日期和时间');
                return;
            }

            // 转换为 Unix 时间戳
            var date = new Date(value);
            var timestamp = Math.floor(date.getTime() / 1000);

            var dateStr = new Date(timestamp * 1000).toLocaleString('zh-CN');
            console.log('保存日期:', itemId, timestamp, dateStr);

            // 显示保存中状态
            var saveBtn = input.parentElement.querySelector('.btn.primary');
            var originalText = saveBtn.textContent;
            saveBtn.textContent = '保存中...';
            saveBtn.disabled = true;

            xhrRequest(API_BASE + '/media/' + itemId + '/date', 'PUT', { create_time: timestamp }, function(response) {
                hideDateInput(itemId);
                // 刷新内容
                loadContent(function() {
                    // 更新统计
                    refreshStats(function() {
                        // 显示成功提示
                        showToast('✓ 日期已更新为 ' + dateStr);
                    });
                });
            }, function(status) {
                var errorMsg = '保存失败: ' + status;
                console.error(errorMsg);
                alert(errorMsg);
                saveBtn.textContent = originalText;
                saveBtn.disabled = false;
            });
        }

        // 显示提示消息
        function showToast(message) {
            // 移除旧的 toast
            var oldToast = document.querySelector('.toast');
            if (oldToast) oldToast.remove();

            // 创建新的 toast
            var toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            // 3秒后移除
            setTimeout(function() {
                toast.classList.add('hide');
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        // 选择/取消选择
        function toggleSelect(id, checkbox) {
            var index = selectedItems.indexOf(id);
            if (index !== -1) {
                selectedItems.splice(index, 1);
                checkbox.classList.remove('checked');
            } else {
                selectedItems.push(id);
                checkbox.classList.add('checked');
            }
            updateSelectedCount();
        }

        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = selectedItems.length;
        }

        // 全选/取消全选
        function toggleAll() {
            var checkboxes = document.querySelectorAll('.checkbox');
            var allChecked = true;

            // 检查是否所有都已选中
            for (var i = 0; i < checkboxes.length; i++) {
                if (!checkboxes[i].classList.contains('checked')) {
                    allChecked = false;
                    break;
                }
            }

            for (var i = 0; i < checkboxes.length; i++) {
                var cb = checkboxes[i];
                if (allChecked) {
                    cb.classList.remove('checked');
                    var id = parseInt(cb.parentElement.parentElement.dataset.id);
                    var index = selectedItems.indexOf(id);
                    if (index !== -1) {
                        selectedItems.splice(index, 1);
                    }
                } else {
                    cb.classList.add('checked');
                    var id = parseInt(cb.parentElement.parentElement.dataset.id);
                    if (selectedItems.indexOf(id) === -1) {
                        selectedItems.push(id);
                    }
                }
            }
            updateSelectedCount();
        }

        // 清空选择
        function clearSelection() {
            selectedItems = [];
            var checked = document.querySelectorAll('.checkbox.checked');
            for (var i = 0; i < checked.length; i++) {
                checked[i].classList.remove('checked');
            }
            updateSelectedCount();
        }

        // 显示/隐藏批量栏
        function showBatchBar() {
            document.getElementById('batchBar').classList.add('visible');
            document.getElementById('content').classList.add('show-checkboxes');
        }

        function hideBatchBar() {
            document.getElementById('batchBar').classList.remove('visible');
            document.getElementById('content').classList.remove('show-checkboxes');
        }

        // 批量设置日期
        function batchSetDate() {
            if (selectedItems.length === 0) {
                alert('请先选择要设置日期的文件');
                return;
            }

            var newDate = prompt('请输入拍摄时间 (格式: YYYY-MM-DD HH:MM)', '');
            if (!newDate) return;

            var parsedDate = new Date(newDate);
            if (isNaN(parsedDate.getTime())) {
                alert('日期格式错误，请使用格式: YYYY-MM-DD HH:MM');
                return;
            }

            var timestamp = parsedDate.getTime() / 1000;

            xhrRequest(API_BASE + '/media/batch-date', 'PUT', {
                item_ids: selectedItems,
                create_time: timestamp
            }, function(result) {
                alert('成功更新 ' + result.updated_count + ' 个文件为 ' + result.create_date);
                clearSelection();
                loadContent(function() {
                    refreshStats();
                });
            }, function(status) {
                alert('更新失败: ' + status);
            });
        }

        // 打开媒体查看器
        function openMedia(index) {
            // 只清除定时器，不停止播放状态
            if (playTimer) {
                clearTimeout(playTimer);
                playTimer = null;
            }

            currentIndex = index;
            var item = currentItems[index];
            var modal = document.getElementById('modal');
            var content = document.getElementById('modalContent');

            // 初始化背景音乐元素
            if (!bgMusicElement) {
                bgMusicElement = document.getElementById('bgMusic');
                if (bgMusicElement) {
                    bgMusicElement.volume = bgMusicVolume;
                }
            }

            // 更新进度显示
            updatePlaybackProgress();

            // 检查是否需要加载更多数据
            checkAndLoadMore();

            if (item.file_type === 'video') {
                content.innerHTML = '<video src="' + item.file_url + '" controls id="currentVideo"></video>';
                videoElement = content.querySelector('video');

                // 视频时停止背景音乐
                if (bgMusicElement) {
                    bgMusicElement.pause();
                    bgMusicElement.currentTime = 0;
                }

                // 视频播放结束后自动跳到下一个
                videoElement.addEventListener('ended', function() {
                    if (isPlaying) {
                        navigate(1);
                    }
                });

                // 如果正在播放，自动开始播放视频
                if (isPlaying) {
                    try {
                        videoElement.play();
                    } catch(e) {
                        console.log('自动播放失败:', e);
                    }
                }
            } else {
                // 照片模式 - 直接替换
                content.innerHTML = '<img src="' + item.file_url + '" alt="' + item.file_name + '" id="currentImage">';
                videoElement = null;

                // 获取图片元素
                var img = content.querySelector('img');

                // 图片加载完成后自动跳转下一张
                var onImageLoad = function() {
                    if (playTimer) {
                        clearTimeout(playTimer);
                        playTimer = null;
                    }

                    var delay = playbackSpeeds[currentSpeedIndex];

                    playTimer = setTimeout(function() {
                        if (isPlaying && currentIndex < currentItems.length - 1) {
                            navigate(1);
                        } else if (isPlaying) {
                            stopPlayback();
                            showToast('播放完毕');
                        }
                    }, delay);
                };

                // 监听图片加载事件
                if (img.complete) {
                    onImageLoad();
                } else {
                    img.onload = onImageLoad;
                    img.onerror = function() {
                        onImageLoad();
                    };
                }

                // 照片时播放背景音乐
                if (bgMusicElement && isPlaying) {
                    try {
                        bgMusicElement.play();
                    } catch(e) {
                        console.log('背景音乐播放失败:', e);
                    }
                }
            }

            // 显示日期信息（播放时隐藏）
            var dateBar = document.getElementById('modalDateBar');
            var dateText = document.getElementById('modalDateText');

            if (currentTab === 'pending') {
                var date = item.create_time ? new Date(item.create_time * 1000).toLocaleString('zh-CN') : '无';
                dateText.textContent = '当前: ' + date + ' | 需要设置拍摄日期';
            } else {
                var date = new Date(item.create_time * 1000);
                dateText.textContent = '拍摄时间: ' + date.toLocaleString('zh-CN');
            }

            // 播放时隐藏日期栏，暂停时显示
            if (isPlaying) {
                dateBar.style.display = 'none';
            } else {
                dateBar.style.display = 'block';
            }

            modal.classList.add('active');
        }

        // 关闭模态框
        function closeModal() {
            stopPlayback();
            // 停止背景音乐
            if (bgMusicElement) {
                bgMusicElement.pause();
                bgMusicElement.currentTime = 0;
            }
            document.getElementById('modal').classList.remove('active');
            document.getElementById('modal').classList.remove('fullscreen');
            document.getElementById('modalContent').innerHTML = '';
            document.getElementById('modalDateBar').style.display = 'none';
        }

        // 导航（按列表顺序播放）
        function navigate(direction) {
            var newIndex = currentIndex + direction;
            if (newIndex >= 0 && newIndex < currentItems.length) {
                openMedia(newIndex);
            } else if (newIndex >= currentItems.length && hasMore) {
                // 还有更多数据，等待加载（会在checkAndLoadMore中触发）
                console.log('[HowTimeFly] 等待加载更多数据...');
                // 延迟一点再试，给数据加载时间
                setTimeout(function() {
                    if (newIndex < currentItems.length) {
                        openMedia(newIndex);
                    } else if (isPlaying && !hasMore) {
                        // 确实没有更多数据了
                        stopPlayback();
                        showToast('播放完毕');
                    }
                }, 500);
            } else {
                // 到达边界且没有更多数据，停止播放
                if (isPlaying) {
                    stopPlayback();
                    showToast('播放完毕');
                }
            }
        }

        // ============ 播放控制函数 ============

        // 切换播放/暂停
        function togglePlay() {
            isPlaying = !isPlaying;
            var playIcon = document.getElementById('playIcon');
            var dateBar = document.getElementById('modalDateBar');

            if (isPlaying) {
                playIcon.textContent = '⏸';
                // 播放时隐藏日期栏
                if (dateBar) dateBar.style.display = 'none';

                // 如果当前是视频，开始播放
                if (videoElement) {
                    try {
                        videoElement.play();
                    } catch(e) {
                        console.log('播放失败:', e);
                        isPlaying = false;
                        playIcon.textContent = '▶';
                        // 恢复显示日期栏
                        if (dateBar) dateBar.style.display = 'block';
                    }
                } else {
                    // 照片，设置定时器并播放背景音乐
                    scheduleNext();
                    if (bgMusicElement) {
                        try {
                            bgMusicElement.play();
                        } catch(e) {
                            console.log('背景音乐播放失败:', e);
                        }
                    }
                }
            } else {
                playIcon.textContent = '▶';
                // 暂停时显示日期栏
                if (dateBar) dateBar.style.display = 'flex';

                // 停止定时器和背景音乐，但不暂停视频
                if (playTimer) {
                    clearTimeout(playTimer);
                    playTimer = null;
                }
                if (bgMusicElement) {
                    bgMusicElement.pause();
                }
                if (videoElement) {
                    videoElement.pause();
                }
            }

            updatePlaybackProgress();
        }

        // 停止播放
        function stopPlayback() {
            isPlaying = false;
            if (playTimer) {
                clearTimeout(playTimer);
                playTimer = null;
            }
            // 停止背景音乐
            if (bgMusicElement) {
                bgMusicElement.pause();
                bgMusicElement.currentTime = 0;
            }
            var playIcon = document.getElementById('playIcon');
            if (playIcon) {
                playIcon.textContent = '▶';
            }
        }

        // 安排下一张（照片）
        function scheduleNext() {
            if (!isPlaying) {
                return;
            }
            if (videoElement) {
                return;
            }

            if (playTimer) {
                clearTimeout(playTimer);
            }

            var delay = playbackSpeeds[currentSpeedIndex];
            playTimer = setTimeout(function() {
                // 按列表顺序播放
                if (isPlaying && currentIndex < currentItems.length - 1) {
                    navigate(1);
                } else if (isPlaying) {
                    // 播放完毕，停止
                    stopPlayback();
                    showToast('✓ 播放完毕');
                }
            }, delay);
        }

        // 更新播放进度显示
        function updatePlaybackProgress() {
            var progress = document.getElementById('playbackProgress');
            var fill = document.getElementById('playbackProgressFill');
            if (progress && fill) {
                var current = currentIndex + 1;
                var total = currentItems.length;
                progress.textContent = current + ' / ' + total;
                fill.style.width = ((current / total) * 100) + '%';
            }
        }

        // 循环切换速度
        function cycleSpeed() {
            currentSpeedIndex = (currentSpeedIndex + 1) % playbackSpeeds.length;
            var speeds = [];
            for (var i = 0; i < playbackSpeeds.length; i++) {
                var s = playbackSpeeds[i];
                if (s === 1000) {
                    speeds.push('1s');
                } else if (s === 3000) {
                    speeds.push('3s');
                } else if (s === 5000) {
                    speeds.push('5s');
                } else {
                    speeds.push('10s');
                }
            }
            document.getElementById('playbackSpeed').textContent = speeds[currentSpeedIndex];

            // 如果正在播放照片，重新安排定时器
            if (isPlaying && !videoElement) {
                scheduleNext();
            }
        }

        // 初始化速度显示
        function initSpeedDisplay() {
            var speedElement = document.getElementById('playbackSpeed');
            if (speedElement) {
                var speeds = ['3s', '5s', '10s'];
                speedElement.textContent = speeds[currentSpeedIndex];
            }
        }

        // 从头开始播放
        function startFromFirst() {
            // 完全重置播放状态
            isPlaying = false;
            if (playTimer) {
                clearTimeout(playTimer);
                playTimer = null;
            }

            // 从第一项开始
            openMedia(0);

            // 延迟一点再开始播放，确保内容加载完成
            setTimeout(function() {
                togglePlay();
            }, 500);
        }

        // 全屏切换
        function toggleFullscreen() {
            var modal = document.getElementById('modal');
            modal.classList.toggle('fullscreen');

            if (modal.classList.contains('fullscreen')) {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        // 全局开始播放（从时间线第一项）
        function startPlayback() {
            if (currentItems.length === 0) {
                showToast('⚠ 没有可播放的媒体');
                return;
            }

            // 切换到时间线标签
            if (currentTab !== 'timeline') {
                switchTab('timeline');
                // 等待加载完成后开始播放
                setTimeout(function() {
                    startFromFirst();
                }, 500);
            } else {
                startFromFirst();
            }
        }

        // 编辑单个日期
        function editDate() {
            var item = currentItems[currentIndex];
            var date = item.create_time ? new Date(item.create_time * 1000) : new Date();

            var year = date.getFullYear();
            var month = padZero(date.getMonth() + 1);
            var day = padZero(date.getDate());
            var hours = padZero(date.getHours());
            var minutes = padZero(date.getMinutes());
            var defaultDate = year + '-' + month + '-' + day + ' ' + hours + ':' + minutes;

            var newDate = prompt('请输入拍摄时间 (格式: YYYY-MM-DD HH:MM)', defaultDate);
            if (newDate === null) return;

            var parsedDate = new Date(newDate);
            if (isNaN(parsedDate.getTime())) {
                alert('日期格式错误，请使用格式: YYYY-MM-DD HH:MM');
                return;
            }

            var timestamp = parsedDate.getTime() / 1000;

            xhrRequest(API_BASE + '/media/' + item.id + '/date', 'PUT', { create_time: timestamp }, function(result) {
                alert('日期更新成功!');
                closeModal();
                loadContent(function() {
                    refreshStats();
                });
            }, function(status) {
                alert('更新失败: ' + status);
            });
        }

        // 键盘控制
        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('modal').classList.contains('active')) return;

            switch (e.key) {
                case 'Escape':
                    closeModal();
                    break;
                case ' ':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowLeft':
                    navigate(-1);
                    break;
                case 'ArrowRight':
                    navigate(1);
                    break;
                case 'f':
                case 'F':
                    toggleFullscreen();
                    break;
            }
        });

        // 点击背景关闭
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
