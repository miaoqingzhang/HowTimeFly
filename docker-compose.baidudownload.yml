version: '3.8'

# 百度网盘下载目录专用配置示例
# 使用方法: docker-compose -f docker-compose.baidudownload.yml up -d

services:
  howtimefly:
    build: .
    container_name: howtimefly
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 挂载数据库和缩略图目录
      - ./data:/app/data

      # ============ 修改这里：改成你的百度网盘下载路径 ============
      # Windows 示例:
      # - D:/BaiduNetdiskDownload:/media/baidudownload:ro
      # Linux/Mac 示例:
      # - /path/to/BaiduNetdiskDownload:/media/baidudownload:ro
      - D:/BaiduNetdiskDownload:/media/baidudownload:ro
      # ========================================================

    environment:
      # 时区设置
      - TZ=Asia/Shanghai

      # ============ 扫描配置 ============
      # 注意: 这里使用的是容器内的路径（/media/baidudownload）
      # 而不是宿主机路径（D:/BaiduNetdiskDownload）
      - SCAN_PATHS=/media/baidudownload

      # 是否递归扫描子目录
      - SCAN_RECURSIVE=true

    networks:
      - howtimefly_network

networks:
  howtimefly_network:
    driver: bridge
