version: 1.0.0
name: HowTimeFly Docker Build

# 触发条件：推送标签时触发
triggers:
  - tag:
      prefix: v

# 全局环境变量
variables:
  DOCKER_IMAGE: howtimefly
  REGISTRY_URL: docker.coding.net  # Coding 容器镜像服务

stages:
  - stage:
      name: build_docker_image
      jobs:
        - name: build_and_push
          runs_on: docker
          steps:
            # 检出代码
            - checkout: self

            # 设置 Docker 镜像标签
            - name: 设置镜像标签
              run: |
                GIT_TAG=${CI_TAG_REF}
                echo "DOCKER_TAG=${GIT_TAG}" >> $CI_JOB_ENV
                echo "构建标签: ${GIT_TAG}"

            # 构建 Docker 镜像
            - name: 构建 Docker 镜像
              run: |
                docker build -t ${DOCKER_IMAGE}:${DOCKER_TAG} .
                docker tag ${DOCKER_IMAGE}:${DOCKER_TAG} ${DOCKER_IMAGE}:latest

            # 登录容器镜像服务（需要配置 CI/CD 凭证）
            - name: 登录容器镜像服务
              run: |
                echo $DOCKER_PASSWORD | docker login --username=$DOCKER_USERNAME --password-stdin docker.coding.net

            # 推送镜像
            - name: 推送镜像
              run: |
                docker push ${DOCKER_IMAGE}:${DOCKER_TAG}
                docker push ${DOCKER_IMAGE}:latest
              if: env.DOCKER_USERNAME != nil

            # 导出镜像为 tar 文件（可直接下载使用）
            - name: 导出镜像文件
              run: |
                docker save ${DOCKER_IMAGE}:${DOCKER_TAG} -o howtimefly-${DOCKER_TAG}.tar
                docker save ${DOCKER_IMAGE}:latest -o howtimefly-latest.tar

            # 上传构建产物
            - name: 上传镜像文件
              artifacts:
                name: docker-images
                paths:
                  - howtimefly-latest.tar
                  - howtimefly-${{ env.DOCKER_TAG }}.tar
                expires_in: 7 days
